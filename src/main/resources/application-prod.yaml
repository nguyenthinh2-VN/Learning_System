spring:
  datasource:
    url: jdbc:mysql://localhost:3306/learning_system?useSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
    username: ${DB_USERNAME}
    password: ${DB_PASSWORD}
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.MySQLDialect
server:
  port: 8080
logging:
  level:
    com.example.learning_system_spring: INFO

jwt:
  secret: ${JWT_SECRET}
  expiration: 86400000
